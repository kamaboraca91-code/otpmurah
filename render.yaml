services:
  - type: web
    name: otp-murah-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: "none"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ADMIN_ACCESS_SECRET
        sync: false
      - key: JWT_ADMIN_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_EXPECTED_HOST
        sync: false
      - key: HEROSMS_API_KEY
        sync: false
      - key: HEROSMS_BASE_URL
        sync: false
      - key: MYPG_API_KEY
        sync: false
      - key: MYPG_MERCHANT_ID
        sync: false
      - key: MYPG_CALLBACK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false

  - type: static
    name: otp-murah-web
    rootDir: .
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE
        sync: false
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
